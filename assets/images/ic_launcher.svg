  <text x="64" y="241" text-anchor="middle" dominant-baseline="central" font-family="Georgia,serif" font-size="22" font-weight="700" fill="#e2e8f0">9</text>
  <text x="437" y="241" text-anchor="middle" dominant-baseline="central" font-family="Georgia,serif" font-size="22" font-weight="700" fill="#e2e8f0">1</text>
