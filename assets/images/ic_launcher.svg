<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="highlight-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect x="0" y="0" width="500" height="500" rx="60" fill="url(#bg-grad)"/>
  <rect x="0" y="0" width="500" height="250" rx="60" fill="url(#highlight-grad)"/>
  <ellipse cx="250" cy="280" rx="160" ry="140" fill="#7c3aed" opacity="0.10"/>

  <!-- Title -->
  <text x="250" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#e2e8f0" letter-spacing="5">SUDOKU</text>
  <line x1="140" y1="65" x2="360" y2="65" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <circle cx="250" cy="65" r="3" fill="#a78bfa"/>

  <!-- Sudoku board background -->
  <rect x="40" y="78" width="420" height="420" rx="12" fill="#0f172a" opacity="0.9"/>

  <!-- Shaded 3x3 boxes (alternating) -->
  <rect x="40" y="78" width="140" height="140" fill="#1e1b4b" opacity="0.5"/>
  <rect x="320" y="78" width="140" height="140" fill="#1e1b4b" opacity="0.5"/>
  <rect x="180" y="218" width="140" height="140" fill="#1e1b4b" opacity="0.5"/>
  <rect x="40" y="358" width="140" height="140" fill="#1e1b4b" opacity="0.5"/>
  <rect x="320" y="358" width="140" height="140" fill="#1e1b4b" opacity="0.5"/>

  <!-- Thin grid lines (within 3x3 boxes) -->
  <line x1="87" y1="78" x2="87" y2="498" stroke="#334155" stroke-width="0.5"/>
  <line x1="133" y1="78" x2="133" y2="498" stroke="#334155" stroke-width="0.5"/>
  <line x1="227" y1="78" x2="227" y2="498" stroke="#334155" stroke-width="0.5"/>
  <line x1="273" y1="78" x2="273" y2="498" stroke="#334155" stroke-width="0.5"/>
  <line x1="367" y1="78" x2="367" y2="498" stroke="#334155" stroke-width="0.5"/>
  <line x1="413" y1="78" x2="413" y2="498" stroke="#334155" stroke-width="0.5"/>

  <line x1="40" y1="125" x2="460" y2="125" stroke="#334155" stroke-width="0.5"/>
  <line x1="40" y1="171" x2="460" y2="171" stroke="#334155" stroke-width="0.5"/>
  <line x1="40" y1="265" x2="460" y2="265" stroke="#334155" stroke-width="0.5"/>
  <line x1="40" y1="311" x2="460" y2="311" stroke="#334155" stroke-width="0.5"/>
  <line x1="40" y1="405" x2="460" y2="405" stroke="#334155" stroke-width="0.5"/>
  <line x1="40" y1="451" x2="460" y2="451" stroke="#334155" stroke-width="0.5"/>

  <!-- Bold box separator lines -->
  <line x1="180" y1="78" x2="180" y2="498" stroke="#7c3aed" stroke-width="2"/>
  <line x1="320" y1="78" x2="320" y2="498" stroke="#7c3aed" stroke-width="2"/>
  <line x1="40" y1="218" x2="460" y2="218" stroke="#7c3aed" stroke-width="2"/>
  <line x1="40" y1="358" x2="460" y2="358" stroke="#7c3aed" stroke-width="2"/>

  <!-- Board outer border -->
  <rect x="40" y="78" width="420" height="420" rx="12" fill="none" stroke="#7c3aed" stroke-width="2.5"/>

  <!-- Highlighted cell -->
  <rect x="273" y="265" width="47" height="46" fill="#7c3aed" opacity="0.35" rx="2"/>
  <rect x="273" y="265" width="47" height="46" fill="none" stroke="#a78bfa" stroke-width="1.5" rx="2"/>

