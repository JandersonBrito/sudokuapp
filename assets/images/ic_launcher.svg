  <text x="297" y="288" text-anchor="middle" dominant-baseline="central" font-family="Georgia,serif" font-size="22" font-weight="700" fill="#a78bfa">8</text>
  <text x="390" y="288" text-anchor="middle" dominant-baseline="central" font-family="Georgia,serif" font-size="22" font-weight="700" fill="#e2e8f0">5</text>
  <text x="110" y="381" text-anchor="middle" dominant-baseline="central" font-family="Georgia,serif" font-size="22" font-weight="700" fill="#e2e8f0">1</text>
  <text x="343" y="381" text-anchor="middle" dominant-baseline="central" font-family="Georgia,serif" font-size="22" font-weight="700" fill="#e2e8f0">7</text>
